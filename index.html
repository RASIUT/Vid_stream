<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#111;
    color:white;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:#1d1d1d;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.title{
    padding:12px;
    text-align:center;
    font-size:16px;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-content{
    width:90%;
    max-width:1000px;
}

video{
    width:100%;
    border-radius:10px;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:40px;
    cursor:pointer;
    color:white;
}
</style>
</head>
<body>

<h1>My Video Gallery</h1>

<div class="gallery">

    <div class="card" onclick="playVideo('videos/video1.mp4')">
        <img src="thumbnails/thumb1.jpg" alt="">
        <div class="title">Video 1</div>
    </div>

    <div class="card" onclick="playVideo('videos/video2.mp4')">
        <img src="thumbnails/thumb2.jpg" alt="">
        <div class="title">Video 2</div>
    </div>

    <div class="card" onclick="playVideo('videos/video3.mp4')">
        <img src="thumbnails/thumb3.jpg" alt="">
        <div class="title">Video 3</div>
    </div>

    <div class="card" onclick="playVideo('videos/video4.mp4')">
        <img src="thumbnails/thumb4.jpg" alt="">
        <div class="title">Video 4</div>
    </div>

</div>

<div class="modal" id="videoModal">
    <span class="close" onclick="closeVideo()">&times;</span>

    <div class="modal-content">
        <video id="player" controls autoplay>
            <source src="" type="video/mp4">
        </video>
    </div>
</div>

<script>
const modal = document.getElementById("videoModal");
const player = document.getElementById("player");

function playVideo(videoSrc){
    player.src = videoSrc;
    modal.style.display = "flex";
    player.play();
}

function closeVideo(){
    player.pause();
    player.src = "";
    modal.style.display = "none";
}

window.onclick = function(event){
    if(event.target === modal){
        closeVideo();
    }
}
</script>

</body>
</html>
