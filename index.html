<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#111;
    color:white;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.status{
    text-align:center;
    margin:-10px 0 20px;
    color:#cfcfcf;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:#1d1d1d;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
}

.thumbnail{
    width:100%;
    height:180px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
    background:#2b2b2b;
    color:#fff;
    text-align:center;
    font-size:18px;
}

.card img.thumbnail{
    display:block;
    padding:0;
    object-fit:cover;
}

.title{
    padding:12px;
    text-align:center;
    font-size:16px;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-content{
    width:90%;
    max-width:1000px;
}

video{
    width:100%;
    border-radius:10px;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:40px;
    cursor:pointer;
    color:white;
}
</style>
</head>
<body>

<h1>My Video Gallery</h1>

<p class="status" id="status">Loading videos...</p>

<div class="gallery" id="gallery"></div>


<div class="modal" id="videoModal">
    <span class="close" onclick="closeVideo()">&times;</span>

    <div class="modal-content">
        <video id="player" controls autoplay playsinline preload="metadata">
            Your browser does not support the video tag.
        </video>
    </div>
</div>
<script>
const archiveIdentifier = "gnai_20260623";
const archiveBaseUrl = `https://archive.org/download/${archiveIdentifier}/`;
const metadataUrl = `https://archive.org/metadata/${archiveIdentifier}`;

function archiveUrl(path){
    return archiveBaseUrl + path.split("/").map(encodeURIComponent).join("/");
}

const gallery = document.getElementById("gallery");
const modal = document.getElementById("videoModal");
const player = document.getElementById("player");
const status = document.getElementById("status");
const titleSorter = new Intl.Collator(undefined, {
    numeric:true,
    sensitivity:"base"
});

function isOriginalVideo(file){
    return file.source === "original" && /\.mp4$/i.test(file.name);
}

function cleanTitle(filename){
    return filename
        .replace(/\.mp4$/i, "")
        .replace(/_/g, " ")
        .replace(/\s+/g, " ")
        .trim();
}

function videoRank(filename){
    if(/roadmap/i.test(filename)){
        return -2;
    }

    if(/GENAI for Beginners/i.test(filename)){
        return 0;
    }

    const numberedVideo = filename.match(/\bVideo\s*[-_ ]*(\d+)\b/i);
    if(numberedVideo){
        return Number(numberedVideo[1]);
    }

    const simpleVideo = filename.match(/^video(\d+)\.mp4$/i);
    if(simpleVideo){
        return Number(simpleVideo[1]);
    }

    return 9999;
}

function sortVideos(first, second){
    const firstRank = videoRank(first.name);
    const secondRank = videoRank(second.name);

    if(firstRank !== secondRank){
        return firstRank - secondRank;
    }

    return titleSorter.compare(first.name, second.name);
}

function groupThumbnails(files){
    return files
        .filter(file => file.format === "Thumbnail" && file.original)
        .reduce((groups, thumbnail) => {
            if(!groups.has(thumbnail.original)){
                groups.set(thumbnail.original, []);
            }

            groups.get(thumbnail.original).push(thumbnail);
            return groups;
        }, new Map());
}

function findThumbnail(videoName, thumbnailsByVideo, fallbackThumbnail){
    const thumbnails = thumbnailsByVideo.get(videoName) || [];
    thumbnails.sort((first, second) => titleSorter.compare(first.name, second.name));

    const thumbnail = thumbnails.find(file => !/_000001\.jpg$/i.test(file.name)) || thumbnails[0] || fallbackThumbnail;
    return thumbnail ? archiveUrl(thumbnail.name) : "";
}

function renderVideoCard(video){
    const card = document.createElement("div");
    card.className = "card";

    if(video.thumbnail){
        const thumbnail = document.createElement("img");
        thumbnail.className = "thumbnail";
        thumbnail.src = video.thumbnail;
        thumbnail.alt = video.title;
        thumbnail.onerror = () => {
            const fallback = document.createElement("div");
            fallback.className = "thumbnail";
            fallback.textContent = video.title;
            thumbnail.replaceWith(fallback);
        };
        card.appendChild(thumbnail);
    } else {
        const fallback = document.createElement("div");
        fallback.className = "thumbnail";
        fallback.textContent = video.title;
        card.appendChild(fallback);
    }

    const title = document.createElement("div");
    title.className = "title";
    title.textContent = video.title;
    card.appendChild(title);

    card.onclick = () => playVideo(video.src, video.thumbnail);

    gallery.appendChild(card);
}

async function loadVideos(){
    try{
        const response = await fetch(metadataUrl);

        if(!response.ok){
            throw new Error(`Internet Archive returned ${response.status}`);
        }

        const metadata = await response.json();
        const files = metadata.files || [];
        const videos = files.filter(isOriginalVideo).sort(sortVideos);
        const thumbnailsByVideo = groupThumbnails(files);
        const fallbackThumbnail = files.find(file => file.name === "__ia_thumb.jpg");

        gallery.innerHTML = "";

        if(videos.length === 0){
            status.textContent = "No MP4 videos found.";
            return;
        }

        videos.forEach(file => {
            renderVideoCard({
                title: cleanTitle(file.name),
                src: archiveUrl(file.name),
                thumbnail: findThumbnail(file.name, thumbnailsByVideo, fallbackThumbnail)
            });
        });

        status.hidden = true;
    } catch(error){
        console.error(error);
        status.textContent = "Could not load videos from Internet Archive.";
    }
}

function playVideo(videoSrc, posterSrc){
    player.poster = posterSrc;
    player.src = videoSrc;
    modal.style.display = "flex";
    player.load();
    player.play().catch(() => {});
}

function closeVideo(){
    player.pause();
    player.removeAttribute("src");
    player.removeAttribute("poster");
    player.load();
    modal.style.display = "none";
}

window.onclick = function(event){
    if(event.target === modal){
        closeVideo();
    }
}

loadVideos();
</script>

</body>
</html>
